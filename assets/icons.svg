<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Undo icon (curved arrow) -->
  <g id="undo" transform="translate(5,5)">
    <path d="M40 20 L20 40 L40 60" fill="none" stroke="#333" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M20 40 L60 40 A30 30 0 0 1 80 60" fill="none" stroke="#333" stroke-width="5" stroke-linecap="round"/>
  </g>
  
  <!-- Reset icon (circular arrow) -->
  <g id="reset" transform="translate(50,5)">
    <path d="M45 20 A30 30 0 1 1 25 50" fill="none" stroke="#333" stroke-width="5" stroke-linecap="round"/>
    <path d="M25 50 L35 35 M25 50 L40 55" fill="none" stroke="#333" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Coach icon (lightbulb) -->
  <g id="coach" transform="translate(5,50)">
    <path d="M25 45 A20 20 0 0 1 25 5 C35 5 45 15 45 25 A20 20 0 0 1 25 45" fill="none" stroke="#333" stroke-width="5" stroke-linecap="round"/>
    <rect x="35" y="45" width="10" height="10" fill="none" stroke="#333" stroke-width="5"/>
    <rect x="30" y="55" width="20" height="5" fill="none" stroke="#333" stroke-width="5"/>
  </g>
  
  <!-- Debug icon (bug) -->
  <g id="debug" transform="translate(50,50)">
    <ellipse cx="45" cy="30" rx="20" ry="15" fill="none" stroke="#333" stroke-width="5"/>
    <path d="M25 20 L15 10 M25 30 L15 30 M25 40 L15 50" stroke="#333" stroke-width="5" stroke-linecap="round"/>
    <path d="M65 20 L75 10 M65 30 L75 30 M65 40 L75 50" stroke="#333" stroke-width="5" stroke-linecap="round"/>
    <path d="M35 45 L35 55 M55 45 L55 55" stroke="#333" stroke-width="5" stroke-linecap="round"/>
  </g>
</svg>
